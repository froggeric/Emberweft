name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# S0 baseline: build + test on macOS 26 (Xcode 26 / Swift 6.2+ required for
# the macOS 26 deployment target and swift-tools-version 6.2).
# Golden-image, Metal↔CPU parity, performance-bench, and swift-format gates
# are added in later milestones (see docs/engineering/testing.md).

jobs:
  build-and-test:
    name: Build & Test (macOS 26)
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test
