name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# S0 baseline: build + test on macOS.
# Golden-image, Metal↔CPU parity, performance-bench, and swift-format gates
# are added in later milestones (see docs/engineering/testing.md).

jobs:
  build-and-test:
    name: Build & Test (macOS)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.6.app/Contents/Developer || true

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version || true

      - name: Build (debug)
        run: swift build

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test
